services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pro-casa-db
    restart: always
    environment:
      POSTGRES_USER: pro_casa_user
      POSTGRES_PASSWORD: pro_casa_dev_password
      POSTGRES_DB: pro_casa_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pro_casa_user -d pro_casa_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - pro-casa-network

  # MinIO Object Storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: pro-casa-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pro-casa-network

  # MinIO Client - для создания бакетов при старте
  minio-init:
    image: minio/mc:latest
    container_name: pro-casa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minio_admin minio_secret_password;
      mc mb myminio/pro-casa-files --ignore-existing;
      mc anonymous set download myminio/pro-casa-files;
      echo 'MinIO bucket created successfully';
      exit 0;
      "
    networks:
      - pro-casa-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pro-casa-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://pro_casa_user:pro_casa_dev_password@postgres:5432/pro_casa_db?schema=public"
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: "7d"
      PORT: 3001
      NODE_ENV: "production"
      CORS_ORIGIN: "*"
      API_URL: "${API_URL:-http://localhost:3001}"
      # MinIO configuration - DISABLED due to signature issues, using local storage
      # MINIO_ENDPOINT: minio
      # MINIO_PORT: "9000"
      # MINIO_ACCESS_KEY: minio_admin
      # MINIO_SECRET_KEY: minio_secret_password
      # MINIO_BUCKET: pro-casa-files
      # MINIO_USE_SSL: "false"
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pro-casa-network

  # Frontend Next.js
  frontend:
    build:
      context: ./pro-casa
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}"
    container_name: pro-casa-frontend
    restart: always
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}"
      BACKEND_URL: "http://backend:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pro-casa-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pro-casa-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/ssl:/etc/nginx/ssl:ro
      - ./deployment/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pro-casa-network

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: pro-casa-certbot
    volumes:
      - ./deployment/ssl:/etc/letsencrypt
      - ./deployment/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - pro-casa-network

volumes:
  postgres_data:
  minio_data:
  uploads_data:

networks:
  pro-casa-network:
    driver: bridge
