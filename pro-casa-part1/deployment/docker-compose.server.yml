# Docker Compose для сервера 91.224.74.17
# Без nginx/certbot - используем системный nginx
# Порты: frontend=3060, backend=3061 (не конфликтуют с PM2 сайтами)

services:
  postgres:
    image: postgres:16-alpine
    container_name: pro-casa-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pro-casa-network

  minio:
    image: minio/minio:latest
    container_name: pro-casa-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pro-casa-network

  minio-init:
    image: minio/mc:latest
    container_name: pro-casa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/pro-casa-files --ignore-existing;
      mc anonymous set download myminio/pro-casa-files;
      echo 'MinIO bucket created successfully';
      exit 0;
      "
    networks:
      - pro-casa-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: pro-casa-backend
    restart: always
    ports:
      - "3061:3001"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: pro-casa-files
      MINIO_USE_SSL: "false"
      API_URL: "http://localhost:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pro-casa-network

  frontend:
    build:
      context: ../pro-casa
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: pro-casa-frontend
    restart: always
    ports:
      - "3060:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      BACKEND_URL: "http://backend:3001"
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pro-casa-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local

networks:
  pro-casa-network:
    driver: bridge
