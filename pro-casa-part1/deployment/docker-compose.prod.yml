services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pro-casa-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pro_casa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pro_casa_prod_password}
      POSTGRES_DB: pro_casa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pro-casa-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: pro-casa-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_prod_password}
      MINIO_BROWSER_REDIRECT_URL: https://pro.casa.kz/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - pro-casa-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pro-casa-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-pro_casa_user}:${POSTGRES_PASSWORD:-pro_casa_prod_password}@postgres:5432/pro_casa_db?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      PORT: 3001
      NODE_ENV: "production"
      CORS_ORIGIN: "https://pro.casa.kz"
      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_prod_password}
      MINIO_BUCKET: pro-casa-files
      MINIO_USE_SSL: "false"
    depends_on:
      - postgres
      - minio
    networks:
      - pro-casa-network

  # Frontend Next.js
  frontend:
    build:
      context: ../pro-casa
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://pro.casa.kz
    container_name: pro-casa-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://pro.casa.kz/api
      NODE_ENV: "production"
    depends_on:
      - backend
    networks:
      - pro-casa-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pro-casa-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - pro-casa-network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: pro-casa-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email admin@casa.kz -d pro.casa.kz --agree-tos

volumes:
  postgres_data:
  minio_data:

networks:
  pro-casa-network:
    driver: bridge
