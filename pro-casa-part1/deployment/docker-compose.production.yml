services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: pro-casa-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pro-casa-network

  # ===========================================
  # MinIO Object Storage (S3 compatible)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: pro-casa-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN}/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pro-casa-network

  # MinIO Bucket Initialization
  minio-init:
    image: minio/mc:latest
    container_name: pro-casa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/pro-casa-files --ignore-existing;
      mc anonymous set download myminio/pro-casa-files;
      echo 'MinIO bucket created successfully';
      exit 0;
      "
    networks:
      - pro-casa-network

  # ===========================================
  # Backend API (Node.js + Prisma)
  # ===========================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: pro-casa-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: pro-casa-files
      MINIO_USE_SSL: "false"
      API_URL: "http://localhost:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pro-casa-network

  # ===========================================
  # Frontend (Next.js Standalone)
  # ===========================================
  frontend:
    build:
      context: ../pro-casa
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: pro-casa-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      BACKEND_URL: "http://backend:3001"
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s
    networks:
      - pro-casa-network

  # ===========================================
  # Nginx Reverse Proxy + SSL
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: pro-casa-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - pro-casa-network

  # ===========================================
  # Certbot (Let's Encrypt SSL)
  # ===========================================
  certbot:
    image: certbot/certbot:latest
    container_name: pro-casa-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - pro-casa-network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local

# ===========================================
# Network
# ===========================================
networks:
  pro-casa-network:
    driver: bridge
